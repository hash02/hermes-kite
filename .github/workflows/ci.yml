name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: lint + format + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate JSON config
        run: |
          python -m json.tool config/policy.json > /dev/null
          python -m json.tool data/nav_ledger.json > /dev/null
          python -m json.tool data/portfolio_summary.json > /dev/null
          python -m json.tool data/agent_registry.json > /dev/null
          python -m json.tool data/kite_settled.json > /dev/null

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

      - name: Type check (mypy engine)
        run: mypy engine

      - name: Tests + coverage
        run: |
          coverage run -m unittest discover tests
          coverage report

      - name: Reconcile (book-only)
        run: python scripts/reconcile.py --skip-onchain
