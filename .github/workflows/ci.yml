name: ci

# Hermes Kite CI: lint + syntax-check Python workers + bash scripts.
# Workers hit live APIs (DeFiLlama, Yahoo, Polymarket) - we don't run them in CI,
# we just verify they parse, lint clean, and survive a syntax/import check.

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-syntax:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit pytest

      - name: Lint with ruff
        run: |
          ruff check funds/ onchain/ tests/ 2>&1 || ruff check funds/ onchain/

      - name: Format check with ruff
        run: |
          ruff format --check funds/ onchain/ tests/ 2>&1 || ruff format --check funds/ onchain/
        continue-on-error: true

      - name: Security scan with bandit
        run: |
          bandit -ll -ii -r funds/ onchain/

      - name: Syntax check workers (compile without executing)
        run: |
          python -m compileall -q funds/ onchain/

      - name: Run smoke tests
        run: |
          pytest tests/ -v
        continue-on-error: false

      - name: Validate bash scripts
        run: |
          for f in scripts/*.sh; do
            [ -f "$f" ] && bash -n "$f" && echo "OK $f" || true
          done
