# Run `pre-commit install` once after `pip install -e ".[dev]"`.
# Then ruff + json-validate run automatically before every commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-json
        files: \.json$
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=200]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        files: ^engine/
        additional_dependencies: [types-requests]
